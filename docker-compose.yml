services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MEDAGENT_DATABASE_URL: postgresql+psycopg://medagent:medagent@postgres:5432/medagent
      MEDAGENT_STORAGE_ENDPOINT: minio:9000
      MEDAGENT_STORAGE_ACCESS_KEY: medagent
      MEDAGENT_STORAGE_SECRET_KEY: medagent-secret
      MEDAGENT_STORAGE_BUCKET: medagent-files
      MEDAGENT_RAG_USE_REMOTE_EMBEDDINGS: ${MEDAGENT_RAG_USE_REMOTE_EMBEDDINGS:-false}
      MEDAGENT_RAG_USE_REMOTE_RERANK: ${MEDAGENT_RAG_USE_REMOTE_RERANK:-false}
      MEDAGENT_DASHSCOPE_API_KEY: ${MEDAGENT_DASHSCOPE_API_KEY:-}
      MEDAGENT_DASHSCOPE_COMPATIBLE_BASE_URL: ${MEDAGENT_DASHSCOPE_COMPATIBLE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      MEDAGENT_DASHSCOPE_RERANK_URL: ${MEDAGENT_DASHSCOPE_RERANK_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - medagent-local:/app/.local
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: medagent
      POSTGRES_USER: medagent
      POSTGRES_PASSWORD: medagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medagent -d medagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: medagent
      MINIO_ROOT_PASSWORD: medagent-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set medagent http://minio:9000 medagent medagent-secret;
      mc mb medagent/medagent-files --ignore-existing;
      echo 'MinIO bucket initialized';
      "

  # Chemprop ADMET prediction service
  chemprop:
    image: chemprop:latest
    build: docker/chemprop
    volumes:
      - ./data/predictions:/data/output
      - ./data/models:/data/models
    command: ["--help"]
    profiles:
      - tools

  # GNINA docking service
  gnina:
    image: ${GNINA_IMAGE:-gnina/gnina:latest}
    volumes:
      - ./data/poses:/data/output
    command: ["--help"]
    profiles:
      - tools

  # AutoDock Vina docking service
  vina:
    image: vina:latest
    build: docker/vina
    volumes:
      - ./data/poses:/data/output
    command: ["-c", "import vina; print('AutoDock Vina installed')"]
    profiles:
      - tools

  # DiffDock pose prediction service
  diffdock:
    image: diffdock:latest
    build: docker/diffdock
    volumes:
      - ./data/poses:/data/output
    command: ["--help"]
    profiles:
      - tools

  # REINVENT4 molecule generation service
  reinvent4:
    image: reinvent4:latest
    build: docker/reinvent4
    volumes:
      - ./data/generated:/data/output
    command: ["--help"]
    profiles:
      - tools

  # AutoGrow4 molecule generation service
  autogrow4:
    image: autogrow4:latest
    build: docker/autogrow4
    volumes:
      - ./data/generated:/data/output
    command: ["--help"]
    profiles:
      - tools

  # AiZynthFinder retrosynthesis planning service
  aizynthfinder:
    image: aizynthfinder:latest
    build: docker/aizynthfinder
    volumes:
      - ./data/retrosynthesis:/data/output
      - ./data/aizynthfinder:/data/aizynthfinder:ro
    command: ["--help"]
    profiles:
      - tools

volumes:
  postgres-data:
  minio-data:
  medagent-local:
